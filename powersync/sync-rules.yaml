# ============================================================
# PowerSync Sync Rules — NotchField Track
# ============================================================
# NO JOINs. NO subqueries. Single table per query.
# ============================================================

bucket_definitions:

  # User profile + per-user state
  by_user:
    parameters:
      - SELECT id AS user_id FROM profiles WHERE id = token_parameters.user_id
    data:
      - SELECT * FROM profiles WHERE id = bucket.user_id
      # Sprint 53A — device_tokens are per-user (push notifications)
      - SELECT * FROM device_tokens WHERE user_id = bucket.user_id
      # Sprint 69 — Notifications Hub (per-user inbox; Web team owns the
      # notifications table + RLS; Track only reads via this rule).
      - SELECT * FROM notifications WHERE recipient_id = bucket.user_id
      # Sprint 70 — Todos Hub (per-user action queue). Web team owns the
      # todos table + RLS + INSERT pipeline. Track READS only the active
      # set (excludes done/dismissed) so the local SQLite payload stays
      # small. Status flips from snoozed → pending happen server-side
      # via Web's snooze_until trigger.
      #
      # NOTE: PowerSync's sync-rule validator does NOT support `IN (...)`
      # lists ("list not supported here" error). Use chained `!=` instead
      # — same effective filter, validator-clean. Mirrors the existing
      # `(area_type = 'individual' OR area_type IS NULL)` pattern below.
      - SELECT * FROM todos
        WHERE owner_profile_id = bucket.user_id
          AND status != 'done'
          AND status != 'dismissed'

  # Org-scoped data
  by_org:
    parameters:
      - SELECT organization_id FROM profiles WHERE id = token_parameters.user_id
    data:
      - SELECT * FROM profiles WHERE organization_id = bucket.organization_id
      - SELECT * FROM organizations WHERE id = bucket.organization_id
      - SELECT * FROM projects WHERE organization_id = bucket.organization_id
      - SELECT * FROM classifications WHERE organization_id = bucket.organization_id
      - SELECT * FROM production_templates WHERE organization_id = bucket.organization_id
      - SELECT * FROM production_template_phases WHERE organization_id = bucket.organization_id
      - SELECT * FROM document_signoffs WHERE organization_id = bucket.organization_id
      - SELECT * FROM drawing_revisions WHERE organization_id = bucket.organization_id
      - SELECT * FROM drawing_register WHERE organization_id = bucket.organization_id
      - SELECT * FROM production_area_objects WHERE organization_id = bucket.organization_id
      - SELECT * FROM production_phase_progress WHERE organization_id = bucket.organization_id
      - SELECT * FROM units WHERE organization_id = bucket.organization_id
      - SELECT * FROM production_areas WHERE organization_id = bucket.organization_id AND (area_type = 'individual' OR area_type IS NULL)
      - SELECT * FROM drawing_sets WHERE organization_id = bucket.organization_id
      - SELECT * FROM drawings WHERE organization_id = bucket.organization_id
      - SELECT * FROM safety_documents WHERE organization_id = bucket.organization_id
      - SELECT * FROM work_tickets WHERE organization_id = bucket.organization_id
      - SELECT * FROM crew_assignments WHERE organization_id = bucket.organization_id
      - SELECT * FROM area_time_entries WHERE organization_id = bucket.organization_id
      - SELECT * FROM gps_checkins WHERE organization_id = bucket.organization_id
      - SELECT * FROM gps_geofences WHERE organization_id = bucket.organization_id
      - SELECT * FROM field_photos WHERE organization_id = bucket.organization_id
      - SELECT * FROM daily_reports WHERE organization_id = bucket.organization_id
      - SELECT * FROM field_messages WHERE organization_id = bucket.organization_id
      # Sprint 71 (2026-04-27) — Web team dropped public.punch_items in
      # favor of the unified Deficiencies system. Sync rule removed; the
      # local SQLite TableV2 declaration for punch_items stays in schema.ts
      # so any leftover query in deprecated code paths (Plans pin overlay
      # is now flag-gated to false but the hook still mounts) returns []
      # instead of throwing "no such table".
      - SELECT * FROM takeoff_objects WHERE organization_id = bucket.organization_id
      - SELECT * FROM production_block_logs WHERE organization_id = bucket.organization_id
      - SELECT * FROM worker_certifications WHERE organization_id = bucket.organization_id
      - SELECT * FROM delivery_tickets WHERE organization_id = bucket.organization_id
      - SELECT * FROM delivery_ticket_items WHERE organization_id = bucket.organization_id
      - SELECT * FROM material_consumption WHERE organization_id = bucket.organization_id
      - SELECT * FROM room_types WHERE organization_id = bucket.organization_id
      - SELECT * FROM room_type_surfaces WHERE organization_id = bucket.organization_id
      - SELECT * FROM phase_progress WHERE organization_id = bucket.organization_id
      - SELECT * FROM delivery_ticket_item_checks WHERE organization_id = bucket.organization_id
      - SELECT * FROM delivery_shipments WHERE organization_id = bucket.organization_id
      - SELECT * FROM delivery_shipment_items WHERE organization_id = bucket.organization_id
      - SELECT * FROM project_assignments WHERE organization_id = bucket.organization_id
      - SELECT * FROM gc_punch_items WHERE organization_id = bucket.organization_id
      - SELECT * FROM document_signatures WHERE organization_id = bucket.organization_id
      - SELECT * FROM feedback_reports WHERE organization_id = bucket.organization_id
      - SELECT * FROM drawing_hyperlinks WHERE organization_id = bucket.organization_id
      - SELECT * FROM drawing_pins WHERE organization_id = bucket.organization_id
      - SELECT * FROM jha_library WHERE organization_id = bucket.organization_id AND active = true
      - SELECT * FROM workers WHERE organization_id = bucket.organization_id
      - SELECT * FROM project_workers WHERE organization_id = bucket.organization_id AND active = true
      - SELECT * FROM toolbox_library WHERE organization_id = bucket.organization_id AND active = true
      - SELECT * FROM toolbox_schedule_overrides WHERE organization_id = bucket.organization_id
      # Sprint 53C — Legal engine (supervisor-only reads enforced in-app)
      - SELECT * FROM legal_documents WHERE organization_id = bucket.organization_id
      - SELECT * FROM delay_cost_logs WHERE organization_id = bucket.organization_id
      # Sprint 71 — Deficiencies (Punch List / QC). Web team owns the
      # `deficiencies` table + RLS + create/resolve/verify/reject pipeline.
      # Track READS only the active set (excludes 'closed') so the local
      # SQLite payload stays small. Same status-filter pattern as todos.
      # `deficiency_library` org-scoped entries; the global library
      # (organization_id IS NULL) ships via the deficiency_library_global
      # bucket below — same constant-marker trick as toolbox_global.
      - SELECT * FROM deficiencies WHERE organization_id = bucket.organization_id AND status != 'closed'
      - SELECT * FROM deficiency_library WHERE organization_id = bucket.organization_id AND active = true

  # Global toolbox topics (organization_id IS NULL) — shared across all orgs.
  # PowerSync's validator rules on this bucket:
  #   1. Every bucket param must appear in the data query's WHERE.
  #   2. `=` cannot have bucket params on BOTH sides (param-to-param rejected).
  #   3. OR branches must reference the same params on both sides.
  # Trick: emit a constant marker as the bucket param and reference it via
  # `bucket.marker = 1` (column-free but constant-compared, which is legal).
  toolbox_global:
    parameters:
      - SELECT 1 AS marker FROM profiles WHERE id = token_parameters.user_id
    data:
      - SELECT * FROM toolbox_library
        WHERE organization_id IS NULL
          AND active = true
          AND bucket.marker = 1

  # Sprint 71 — Global deficiency library (organization_id IS NULL),
  # ~40 templates × 5 trades shared across all orgs. Same constant-marker
  # trick as toolbox_global — required by PowerSync's bucket-param
  # validator for queries with no other WHERE on bucket params.
  deficiency_library_global:
    parameters:
      - SELECT 1 AS marker FROM profiles WHERE id = token_parameters.user_id
    data:
      - SELECT * FROM deficiency_library
        WHERE organization_id IS NULL
          AND active = true
          AND bucket.marker = 1
