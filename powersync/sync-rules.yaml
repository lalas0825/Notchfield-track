# ============================================================
# PowerSync Sync Rules — NotchField Track
# ============================================================
# NO JOINs. NO subqueries. Single table per query.
# ============================================================

bucket_definitions:

  # User profile
  by_user:
    parameters:
      - SELECT id AS user_id FROM profiles WHERE id = token_parameters.user_id
    data:
      - SELECT * FROM profiles WHERE id = bucket.user_id

  # Org-scoped data
  by_org:
    parameters:
      - SELECT organization_id FROM profiles WHERE id = token_parameters.user_id
    data:
      - SELECT * FROM profiles WHERE organization_id = bucket.organization_id
      - SELECT * FROM organizations WHERE id = bucket.organization_id
      - SELECT * FROM projects WHERE organization_id = bucket.organization_id
      - SELECT * FROM classifications WHERE organization_id = bucket.organization_id
      - SELECT * FROM production_templates WHERE organization_id = bucket.organization_id
      - SELECT * FROM production_template_phases WHERE organization_id = bucket.organization_id
      - SELECT * FROM document_signoffs WHERE organization_id = bucket.organization_id
      - SELECT * FROM drawing_revisions WHERE organization_id = bucket.organization_id
      - SELECT * FROM production_area_objects WHERE organization_id = bucket.organization_id
      - SELECT * FROM production_phase_progress WHERE organization_id = bucket.organization_id
      - SELECT * FROM units WHERE organization_id = bucket.organization_id
      - SELECT * FROM production_areas WHERE organization_id = bucket.organization_id AND (area_type = 'individual' OR area_type IS NULL)
      - SELECT * FROM drawing_sets WHERE organization_id = bucket.organization_id
      - SELECT * FROM drawings WHERE organization_id = bucket.organization_id
      - SELECT * FROM safety_documents WHERE organization_id = bucket.organization_id
      - SELECT * FROM work_tickets WHERE organization_id = bucket.organization_id
      - SELECT * FROM crew_assignments WHERE organization_id = bucket.organization_id
      - SELECT * FROM area_time_entries WHERE organization_id = bucket.organization_id
      - SELECT * FROM gps_checkins WHERE organization_id = bucket.organization_id
      - SELECT * FROM gps_geofences WHERE organization_id = bucket.organization_id
      - SELECT * FROM field_photos WHERE organization_id = bucket.organization_id
      - SELECT * FROM daily_reports WHERE organization_id = bucket.organization_id
      - SELECT * FROM field_messages WHERE organization_id = bucket.organization_id
      - SELECT * FROM punch_items WHERE organization_id = bucket.organization_id
      - SELECT * FROM legal_documents WHERE organization_id = bucket.organization_id
      - SELECT * FROM takeoff_objects WHERE organization_id = bucket.organization_id
      - SELECT * FROM master_production_targets WHERE organization_id = bucket.organization_id
      - SELECT * FROM production_block_logs WHERE organization_id = bucket.organization_id
      - SELECT * FROM worker_certifications WHERE organization_id = bucket.organization_id
      - SELECT * FROM delivery_tickets WHERE organization_id = bucket.organization_id
      - SELECT * FROM delivery_ticket_items WHERE organization_id = bucket.organization_id
      - SELECT * FROM material_consumption WHERE organization_id = bucket.organization_id
      - SELECT * FROM room_types WHERE organization_id = bucket.organization_id
      - SELECT * FROM room_type_surfaces WHERE organization_id = bucket.organization_id
      - SELECT * FROM phase_progress WHERE organization_id = bucket.organization_id
